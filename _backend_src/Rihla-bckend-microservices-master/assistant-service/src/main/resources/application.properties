spring.application.name=assistant-service
server.port=8094



eureka.client.service-url.defaultZone=http://localhost:8761/eureka/



spring.data.mongodb.uri=mongodb://localhost:27017/rihla_assistant


ai.api.url=https://api.groq.com/openai/v1/chat/completions

ai.api.key=${AI_API_KEY:gsk_REDACTED}

eureka.client.enabled=true
eureka.instance.prefer-ip-address=true

rihla.app.jwtSecret=${JWT_SECRET:rihla-super-secret-key-32-chars-min-2026!!}

ai.model=${AI_MODEL:llama-3.3-70b-versatile}
