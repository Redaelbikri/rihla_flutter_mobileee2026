spring.application.name=reservation-service
server.port=8085

spring.data.mongodb.uri=mongodb://localhost:27017/rihla_reservation_db

rihla.app.jwtSecret=${JWT_SECRET:rihla-super-secret-key-32-chars-min-2026!!}

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Feign timeouts
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Kafka Consumer (listen to payment.events)
spring.kafka.consumer.group-id=reservation-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.rihla.reservationservice.kafka.DomainEvent
